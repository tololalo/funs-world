<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="400" height="300" fill="#0D1120"/>

  <!-- Parallax city silhouette background -->
  <g opacity="0.3">
    <!-- Building 1 -->
    <rect x="0" y="180" width="60" height="120" fill="#1a2847"/>
    <rect x="5" y="190" width="8" height="12" fill="#2a4a7f"/>
    <rect x="18" y="190" width="8" height="12" fill="#2a4a7f"/>
    <rect x="31" y="190" width="8" height="12" fill="#2a4a7f"/>
    <rect x="44" y="190" width="8" height="12" fill="#2a4a7f"/>
    <rect x="5" y="210" width="8" height="12" fill="#2a4a7f"/>
    <rect x="18" y="210" width="8" height="12" fill="#2a4a7f"/>
    <rect x="31" y="210" width="8" height="12" fill="#2a4a7f"/>
    <rect x="44" y="210" width="8" height="12" fill="#2a4a7f"/>

    <!-- Building 2 -->
    <rect x="70" y="160" width="80" height="140" fill="#1a2847"/>
    <rect x="80" y="175" width="10" height="15" fill="#2a4a7f"/>
    <rect x="100" y="175" width="10" height="15" fill="#2a4a7f"/>
    <rect x="120" y="175" width="10" height="15" fill="#2a4a7f"/>
    <rect x="80" y="200" width="10" height="15" fill="#2a4a7f"/>
    <rect x="100" y="200" width="10" height="15" fill="#2a4a7f"/>
    <rect x="120" y="200" width="10" height="15" fill="#2a4a7f"/>

    <!-- Building 3 -->
    <rect x="160" y="190" width="50" height="110" fill="#1a2847"/>
    <rect x="170" y="205" width="8" height="12" fill="#2a4a7f"/>
    <rect x="185" y="205" width="8" height="12" fill="#2a4a7f"/>

    <!-- Building 4 -->
    <rect x="230" y="170" width="70" height="130" fill="#1a2847"/>
    <polygon points="230,170 265,130 300,170" fill="#0a1a37"/>

    <!-- Building 5 -->
    <rect x="320" y="185" width="80" height="115" fill="#1a2847"/>
  </g>

  <!-- Stars in sky -->
  <circle cx="30" cy="30" r="1.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="80" cy="50" r="1" fill="#FFD700" opacity="0.5"/>
  <circle cx="150" cy="40" r="1.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="280" cy="35" r="1" fill="#FFD700" opacity="0.5"/>
  <circle cx="350" cy="50" r="1.5" fill="#FFD700" opacity="0.6"/>

  <!-- Orange neon ground line/platform -->
  <rect x="0" y="220" width="400" height="4" fill="#FF6B35" opacity="0.9"/>
  <rect x="0" y="224" width="400" height="2" fill="#FFD700" opacity="0.6"/>

  <!-- Gap in platform -->
  <rect x="220" y="220" width="50" height="80" fill="#0D1120" stroke="#FF6B35" stroke-width="1" opacity="0.8"/>

  <!-- Spike obstacles on ground -->
  <polygon points="120,220 125,200 130,220" fill="#ef5350"/>
  <polygon points="145,220 150,205 155,220" fill="#ef5350"/>
  <polygon points="300,220 305,200 310,220" fill="#ef5350"/>

  <!-- Speed lines behind runner -->
  <line x1="80" y1="160" x2="60" y2="160" stroke="#FF6B35" stroke-width="2" opacity="0.6"/>
  <line x1="85" y1="170" x2="60" y2="170" stroke="#FF6B35" stroke-width="2" opacity="0.4"/>
  <line x1="80" y1="180" x2="65" y2="180" stroke="#FF6B35" stroke-width="1.5" opacity="0.3"/>

  <!-- Running character: geometric shape in orange, mid-jump pose -->
  <!-- Body -->
  <rect x="100" y="155" width="20" height="25" fill="#FF6B35" rx="2"/>
  <!-- Head -->
  <circle cx="110" cy="145" r="7" fill="#FF6B35"/>
  <!-- Left arm (raised) -->
  <rect x="85" y="150" width="15" height="6" fill="#FF6B35" transform="rotate(-45 92.5 153)"/>
  <!-- Right arm (down) -->
  <rect x="120" y="165" width="15" height="5" fill="#FF6B35" transform="rotate(30 127.5 167.5)"/>
  <!-- Left leg (up - jumping) -->
  <rect x="95" y="165" width="8" height="20" fill="#FF6B35" transform="rotate(-30 99 165)"/>
  <!-- Right leg (extended) -->
  <rect x="110" y="175" width="8" height="25" fill="#FF6B35" transform="rotate(45 114 175)"/>

  <!-- 3-4 floating gold coins ahead -->
  <!-- Coin 1 -->
  <circle cx="200" cy="140" r="8" fill="#FFD700" stroke="#ffa500" stroke-width="1"/>
  <text x="200" y="145" font-family="Arial, sans-serif" font-size="10" fill="#0D1120" text-anchor="middle" dominant-baseline="middle" font-weight="bold">F</text>

  <!-- Coin 2 -->
  <circle cx="260" cy="125" r="8" fill="#FFD700" stroke="#ffa500" stroke-width="1"/>
  <text x="260" y="130" font-family="Arial, sans-serif" font-size="10" fill="#0D1120" text-anchor="middle" dominant-baseline="middle" font-weight="bold">F</text>

  <!-- Coin 3 -->
  <circle cx="310" cy="145" r="8" fill="#FFD700" stroke="#ffa500" stroke-width="1"/>
  <text x="310" y="150" font-family="Arial, sans-serif" font-size="10" fill="#0D1120" text-anchor="middle" dominant-baseline="middle" font-weight="bold">F</text>

  <!-- Coin 4 -->
  <circle cx="350" cy="135" r="8" fill="#FFD700" stroke="#ffa500" stroke-width="1"/>
  <text x="350" y="140" font-family="Arial, sans-serif" font-size="10" fill="#0D1120" text-anchor="middle" dominant-baseline="middle" font-weight="bold">F</text>

  <!-- Sparkle effects around coins -->
  <circle cx="195" cy="135" r="1" fill="#FFD700" opacity="0.8"/>
  <circle cx="265" cy="118" r="1" fill="#FFD700" opacity="0.8"/>
  <circle cx="305" cy="140" r="1" fill="#FFD700" opacity="0.8"/>
  <circle cx="355" cy="130" r="1" fill="#FFD700" opacity="0.8"/>

  <!-- Score "1,234m" text top-right -->
  <rect x="310" y="20" width="85" height="40" fill="rgba(0,0,0,0.5)" stroke="#FF6B35" stroke-width="1.5" rx="3"/>
  <text x="352" y="35" font-family="Arial, sans-serif" font-size="12" fill="#FF6B35" text-anchor="middle" font-weight="bold">DISTANCE</text>
  <text x="352" y="50" font-family="Arial, sans-serif" font-size="16" fill="#FFD700" text-anchor="middle" font-weight="bold">1,234m</text>

  <!-- Title at bottom -->
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FF6B35" text-anchor="middle">RUNNER DASH</text>
</svg>
