<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="400" height="300" fill="#0D1120"/>

  <!-- Defs for gradients and glow effects -->
  <defs>
    <radialGradient id="megaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0.3"/>
    </radialGradient>
    <radialGradient id="goldGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FFED4E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1"/>
    </radialGradient>
    <filter id="cellGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 4x4 Grid background -->
  <rect x="60" y="80" width="280" height="160" fill="rgba(0,0,0,0.3)" stroke="#2a3f5f" stroke-width="1"/>

  <!-- Grid Lines -->
  <line x1="130" y1="80" x2="130" y2="240" stroke="#1a2847" stroke-width="1"/>
  <line x1="200" y1="80" x2="200" y2="240" stroke="#1a2847" stroke-width="1"/>
  <line x1="270" y1="80" x2="270" y2="240" stroke="#1a2847" stroke-width="1"/>

  <line x1="60" y1="120" x2="340" y2="120" stroke="#1a2847" stroke-width="1"/>
  <line x1="60" y1="160" x2="340" y2="160" stroke="#1a2847" stroke-width="1"/>
  <line x1="60" y1="200" x2="340" y2="200" stroke="#1a2847" stroke-width="1"/>

  <!-- Row 1 -->
  <!-- Cell 1: 2 -->
  <rect x="65" y="85" width="60" height="30" fill="#1a4a7f" stroke="#4FC3F7" stroke-width="1" rx="3"/>
  <text x="95" y="105" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4FC3F7" text-anchor="middle">2</text>

  <!-- Cell 2: 4 -->
  <rect x="135" y="85" width="60" height="30" fill="#2a5a9f" stroke="#4FC3F7" stroke-width="1" rx="3"/>
  <text x="165" y="105" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFD700" text-anchor="middle">4</text>

  <!-- Cell 3: 8 -->
  <rect x="205" y="85" width="60" height="30" fill="#1a3a8f" stroke="#FF6B35" stroke-width="1" rx="3"/>
  <text x="235" y="105" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FF6B35" text-anchor="middle">8</text>

  <!-- Cell 4: 16 -->
  <rect x="275" y="85" width="60" height="30" fill="#3a4a6f" stroke="#ef5350" stroke-width="1" rx="3"/>
  <text x="305" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ef5350" text-anchor="middle">16</text>

  <!-- Row 2 -->
  <!-- Cell 1: 32 -->
  <rect x="65" y="125" width="60" height="30" fill="#5a2a3f" stroke="#CE93D8" stroke-width="1" rx="3"/>
  <text x="95" y="145" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#CE93D8" text-anchor="middle">32</text>

  <!-- Cell 2: 64 -->
  <rect x="135" y="125" width="60" height="30" fill="#7a1a1f" stroke="#ef5350" stroke-width="1" rx="3"/>
  <text x="165" y="145" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFB6C1" text-anchor="middle">64</text>

  <!-- Cell 3: 128 -->
  <rect x="205" y="125" width="60" height="30" fill="#6a5a1f" stroke="#FFD700" stroke-width="1" rx="3"/>
  <text x="235" y="145" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFD700" text-anchor="middle">128</text>

  <!-- Cell 4: empty -->
  <rect x="275" y="125" width="60" height="30" fill="rgba(20,20,40,0.5)" stroke="#1a2847" stroke-width="1" rx="3"/>

  <!-- Row 3 -->
  <!-- Cell 1: empty -->
  <rect x="65" y="165" width="60" height="30" fill="rgba(20,20,40,0.5)" stroke="#1a2847" stroke-width="1" rx="3"/>

  <!-- Cell 2: 256 -->
  <rect x="135" y="165" width="60" height="30" fill="#7a6a0f" stroke="#FFD700" stroke-width="1" rx="3"/>
  <text x="165" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFED4E" text-anchor="middle">256</text>

  <!-- Cell 3: 512 -->
  <rect x="205" y="165" width="60" height="30" fill="#8a7a0f" stroke="#FFED4E" stroke-width="1.5" rx="3"/>
  <text x="235" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFED4E" text-anchor="middle">512</text>

  <!-- Cell 4: 1024 -->
  <rect x="275" y="165" width="60" height="30" fill="#9a8a0f" stroke="#FFED4E" stroke-width="1.5" rx="3"/>
  <text x="305" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFED4E" text-anchor="middle">1024</text>

  <!-- Row 4 -->
  <!-- Cell 1: empty -->
  <rect x="65" y="205" width="60" height="30" fill="rgba(20,20,40,0.5)" stroke="#1a2847" stroke-width="1" rx="3"/>

  <!-- Cell 2: empty -->
  <rect x="135" y="205" width="60" height="30" fill="rgba(20,20,40,0.5)" stroke="#1a2847" stroke-width="1" rx="3"/>

  <!-- Cell 3: empty -->
  <rect x="205" y="205" width="60" height="30" fill="rgba(20,20,40,0.5)" stroke="#1a2847" stroke-width="1" rx="3"/>

  <!-- Cell 4: 2048 with MEGA GLOW -->
  <g filter="url(#cellGlow)">
    <rect x="275" y="205" width="60" height="30" fill="url(#megaGlow)" stroke="#FFD700" stroke-width="2.5" rx="3"/>
    <text x="305" y="225" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0D1120" text-anchor="middle">2048</text>
  </g>

  <!-- Additional sparkle effect around 2048 tile -->
  <circle cx="280" cy="210" r="1.5" fill="#FFD700" opacity="0.8"/>
  <circle cx="330" cy="215" r="1.5" fill="#FFD700" opacity="0.8"/>
  <circle cx="305" cy="200" r="1.5" fill="#FFD700" opacity="0.8"/>
  <circle cx="310" cy="235" r="1.5" fill="#FFD700" opacity="0.8"/>

  <!-- Score/Level display top -->
  <rect x="100" y="20" width="200" height="45" fill="rgba(0,0,0,0.5)" stroke="#4FC3F7" stroke-width="1.5" rx="3"/>
  <text x="200" y="35" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" text-anchor="middle" font-weight="bold">Score: 48,632</text>
  <text x="200" y="55" font-family="Arial, sans-serif" font-size="11" fill="#FFD700" text-anchor="middle">Best: 131,072</text>

  <!-- Title at bottom -->
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFD700" text-anchor="middle">2048</text>
</svg>
