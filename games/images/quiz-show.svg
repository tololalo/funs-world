<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="400" height="300" fill="#0D1120"/>

  <!-- Defs for gradients and filters -->
  <defs>
    <radialGradient id="spotlight" cx="50%" cy="0%" r="80%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="qmarkGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#FFED4E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1"/>
    </radialGradient>
    <filter id="qmarkGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="confettiGlow">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- Spotlight from top -->
  <ellipse cx="200" cy="0" rx="150" ry="180" fill="url(#spotlight)"/>

  <!-- Stage base/floor -->
  <rect x="0" y="220" width="400" height="80" fill="rgba(0,0,0,0.4)"/>
  <line x1="0" y1="220" x2="400" y2="220" stroke="#4FC3F7" stroke-width="2"/>

  <!-- Giant question mark in center with glow -->
  <g filter="url(#qmarkGlow)">
    <circle cx="200" cy="110" r="70" fill="url(#qmarkGrad)" stroke="#FF6B35" stroke-width="3"/>
    <text x="200" y="135" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#0D1120" text-anchor="middle" dominant-baseline="middle">?</text>
  </g>

  <!-- Confetti/star particles scattered -->
  <g filter="url(#confettiGlow)">
    <!-- Gold stars -->
    <polygon points="50,40 55,55 71,55 58,65 63,80 50,70 37,80 42,65 29,55 45,55" fill="#FFD700"/>
    <polygon points="350,45 354,58 368,58 357,66 360,80 350,72 340,80 343,66 332,58 346,58" fill="#FFD700"/>
    <polygon points="70,200 74,210 86,210 77,217 80,227 70,220 60,227 63,217 54,210 66,210" fill="#FFD700"/>
    <polygon points="330,190 334,200 346,200 337,207 340,217 330,210 320,217 323,207 314,200 326,200" fill="#FFD700"/>

    <!-- Orange confetti pieces -->
    <rect x="100" y="50" width="8" height="12" fill="#FF6B35" opacity="0.8" transform="rotate(25 104 56)"/>
    <rect x="300" y="60" width="8" height="12" fill="#FF6B35" opacity="0.8" transform="rotate(-30 304 66)"/>
    <rect x="120" y="180" width="6" height="10" fill="#FF6B35" opacity="0.7" transform="rotate(45 123 185)"/>
    <rect x="280" y="170" width="6" height="10" fill="#FF6B35" opacity="0.7" transform="rotate(-45 283 175)"/>

    <!-- Cyan sparkles -->
    <circle cx="150" cy="70" r="2" fill="#4FC3F7" opacity="0.9"/>
    <circle cx="250" cy="80" r="2" fill="#4FC3F7" opacity="0.9"/>
    <circle cx="160" cy="190" r="1.5" fill="#4FC3F7" opacity="0.8"/>
    <circle cx="260" cy="200" r="1.5" fill="#4FC3F7" opacity="0.8"/>
  </g>

  <!-- Timer icon top-right -->
  <circle cx="350" cy="30" r="18" fill="rgba(0,0,0,0.5)" stroke="#4FC3F7" stroke-width="1.5"/>
  <text x="350" y="40" font-family="Arial, sans-serif" font-size="28" fill="#4FC3F7" text-anchor="middle" dominant-baseline="middle">⏱</text>

  <!-- 4 answer boxes at bottom -->
  <!-- A (Orange) -->
  <rect x="30" y="250" width="80" height="40" fill="#FF6B35" stroke="#FFED4E" stroke-width="1.5" rx="4"/>
  <text x="70" y="270" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0D1120" text-anchor="middle" dominant-baseline="middle">A</text>

  <!-- B (Cyan) -->
  <rect x="120" y="250" width="80" height="40" fill="#4FC3F7" stroke="#FFED4E" stroke-width="1.5" rx="4"/>
  <text x="160" y="270" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0D1120" text-anchor="middle" dominant-baseline="middle">B</text>

  <!-- C (Green) -->
  <rect x="210" y="250" width="80" height="40" fill="#81C784" stroke="#FFED4E" stroke-width="1.5" rx="4"/>
  <text x="250" y="270" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0D1120" text-anchor="middle" dominant-baseline="middle">C</text>

  <!-- D (Gold) -->
  <rect x="300" y="250" width="80" height="40" fill="#FFD700" stroke="#FF6B35" stroke-width="2" rx="4"/>
  <text x="340" y="270" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0D1120" text-anchor="middle" dominant-baseline="middle">D</text>

  <!-- Additional shine on D (selected answer) -->
  <ellipse cx="320" cy="255" rx="15" ry="8" fill="rgba(255,255,255,0.3)"/>

  <!-- Title at bottom -->
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFD700" text-anchor="middle">FUNS QUIZ</text>
</svg>
