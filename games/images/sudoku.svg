<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="400" height="300" fill="#0D1120"/>

  <!-- Brain/Gear icon in corner -->
  <g transform="translate(340, 25)">
    <!-- Gear shape -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="#CE93D8" stroke-width="1"/>
    <rect x="-2" y="-12" width="4" height="4" fill="#CE93D8"/>
    <rect x="-2" y="8" width="4" height="4" fill="#CE93D8"/>
    <rect x="-12" y="-2" width="4" height="4" fill="#CE93D8"/>
    <rect x="8" y="-2" width="4" height="4" fill="#CE93D8"/>
    <circle cx="0" cy="0" r="4" fill="#CE93D8"/>
  </g>

  <!-- 9x9 Sudoku Grid -->
  <!-- Define the grid starting at (60, 60) with cell size 25 -->

  <!-- Thin grid lines -->
  <defs>
    <style>
      .thinLine { stroke: #333333; stroke-width: 0.5; }
      .thickLine { stroke: #555555; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Vertical thin lines -->
  <line x1="85" y1="60" x2="85" y2="285" class="thinLine"/>
  <line x1="110" y1="60" x2="110" y2="285" class="thinLine"/>
  <line x1="160" y1="60" x2="160" y2="285" class="thinLine"/>
  <line x1="185" y1="60" x2="185" y2="285" class="thinLine"/>
  <line x1="210" y1="60" x2="210" y2="285" class="thinLine"/>
  <line x1="260" y1="60" x2="260" y2="285" class="thinLine"/>
  <line x1="285" y1="60" x2="285" y2="285" class="thinLine"/>
  <line x1="310" y1="60" x2="310" y2="285" class="thinLine"/>

  <!-- Horizontal thin lines -->
  <line x1="60" y1="85" x2="335" y2="85" class="thinLine"/>
  <line x1="60" y1="110" x2="335" y2="110" class="thinLine"/>
  <line x1="60" y1="160" x2="335" y2="160" class="thinLine"/>
  <line x1="60" y1="185" x2="335" y2="185" class="thinLine"/>
  <line x1="60" y1="210" x2="335" y2="210" class="thinLine"/>
  <line x1="60" y1="260" x2="335" y2="260" class="thinLine"/>
  <line x1="60" y1="285" x2="335" y2="285" class="thinLine"/>

  <!-- Thick 3x3 box borders -->
  <!-- Top border -->
  <line x1="60" y1="60" x2="335" y2="60" class="thickLine"/>
  <!-- Bottom border -->
  <line x1="60" y1="285" x2="335" y2="285" class="thickLine"/>
  <!-- Left border -->
  <line x1="60" y1="60" x2="60" y2="285" class="thickLine"/>
  <!-- Right border -->
  <line x1="335" y1="60" x2="335" y2="285" class="thickLine"/>

  <!-- Internal thick lines (3x3 box dividers) -->
  <!-- Vertical -->
  <line x1="135" y1="60" x2="135" y2="285" class="thickLine"/>
  <line x1="235" y1="60" x2="235" y2="285" class="thickLine"/>
  <!-- Horizontal -->
  <line x1="60" y1="135" x2="335" y2="135" class="thickLine"/>
  <line x1="60" y1="235" x2="335" y2="235" class="thickLine"/>

  <!-- Highlighted 3x3 box with subtle cyan background -->
  <rect x="135" y="60" width="100" height="75" fill="#4FC3F7" opacity="0.15"/>

  <!-- Numbers in cells -->
  <!-- Row 1 -->
  <text x="72" y="78" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" font-weight="bold">7</text>
  <text x="97" y="78" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">2</text>
  <text x="147" y="78" font-family="Arial, sans-serif" font-size="12" fill="#FF6B35" font-weight="bold">9</text>
  <text x="172" y="78" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">4</text>
  <text x="197" y="78" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" font-weight="bold">1</text>
  <text x="247" y="78" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">8</text>
  <text x="272" y="78" font-family="Arial, sans-serif" font-size="12" fill="#FF6B35" font-weight="bold">5</text>
  <text x="297" y="78" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">3</text>
  <text x="322" y="78" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" font-weight="bold">6</text>

  <!-- Row 2 -->
  <text x="72" y="103" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">8</text>
  <text x="97" y="103" font-family="Arial, sans-serif" font-size="12" fill="#FF6B35" font-weight="bold">3</text>
  <text x="147" y="103" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" font-weight="bold">4</text>
  <text x="172" y="103" font-family="Arial, sans-serif" font-size="12" fill="#FF6B35" font-weight="bold">2</text>
  <text x="197" y="103" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">7</text>
  <text x="247" y="103" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" font-weight="bold">6</text>
  <text x="272" y="103" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">9</text>
  <text x="297" y="103" font-family="Arial, sans-serif" font-size="12" fill="#FF6B35" font-weight="bold">1</text>

  <!-- Row 3 -->
  <text x="72" y="128" font-family="Arial, sans-serif" font-size="12" fill="#FF6B35" font-weight="bold">5</text>
  <text x="147" y="128" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">1</text>
  <text x="172" y="128" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" font-weight="bold">6</text>
  <text x="197" y="128" font-family="Arial, sans-serif" font-size="12" fill="#FF6B35" font-weight="bold">3</text>
  <text x="247" y="128" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">2</text>
  <text x="322" y="128" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" font-weight="bold">7</text>

  <!-- Row 4 -->
  <text x="97" y="153" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" font-weight="bold">6</text>
  <text x="147" y="153" font-family="Arial, sans-serif" font-size="12" fill="#FF6B35" font-weight="bold">8</text>
  <text x="172" y="153" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">5</text>
  <text x="247" y="153" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" font-weight="bold">9</text>
  <text x="297" y="153" font-family="Arial, sans-serif" font-size="12" fill="#FF6B35" font-weight="bold">4</text>

  <!-- Row 5 -->
  <text x="72" y="178" font-family="Arial, sans-serif" font-size="12" fill="#FF6B35" font-weight="bold">2</text>
  <text x="147" y="178" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" font-weight="bold">3</text>
  <text x="197" y="178" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">8</text>
  <text x="247" y="178" font-family="Arial, sans-serif" font-size="12" fill="#FF6B35" font-weight="bold">5</text>
  <text x="322" y="178" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">2</text>

  <!-- Row 6 -->
  <text x="72" y="203" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" font-weight="bold">1</text>
  <text x="97" y="203" font-family="Arial, sans-serif" font-size="12" fill="#FF6B35" font-weight="bold">4</text>
  <text x="197" y="203" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" font-weight="bold">9</text>
  <text x="247" y="203" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">7</text>

  <!-- Row 7 -->
  <text x="147" y="253" font-family="Arial, sans-serif" font-size="12" fill="#FF6B35" font-weight="bold">7</text>
  <text x="172" y="253" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" font-weight="bold">9</text>
  <text x="247" y="253" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" font-weight="bold">3</text>

  <!-- Row 8 -->
  <text x="72" y="278" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">3</text>
  <text x="247" y="278" font-family="Arial, sans-serif" font-size="12" fill="#FF6B35" font-weight="bold">1</text>
  <text x="297" y="278" font-family="Arial, sans-serif" font-size="12" fill="#4FC3F7" font-weight="bold">8</text>

  <!-- Title at bottom -->
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4FC3F7" text-anchor="middle">SUDOKU</text>
</svg>
